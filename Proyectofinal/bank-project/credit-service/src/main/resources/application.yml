# =============================================
# Configuración del servidor
# =============================================
server:
  port: 8083

spring:
  application:
    name: credit-service
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://mongo-bank:27017/credit_db}
      auto-index-creation: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka-1:9092}
  main:
    allow-bean-definition-overriding: true
  devtools:
    restart:
      enabled: true
  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    com.bank.credit: DEBUG

schema:
  registry:
    url: http://schema-registry:8081

management:
  endpoints:
    web:
      exposure:
        include: "health,info,env"
  endpoint:
    health:
      show-details: always

