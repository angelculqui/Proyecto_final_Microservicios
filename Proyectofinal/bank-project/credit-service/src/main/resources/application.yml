server:
  port: 8083

spring:
  application:
    name: credit-service
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://mongo-bank:27017/credit_db}
      auto-index-creation: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
  main:
    allow-bean-definition-overriding: true
  devtools:
    restart:
      enabled: true
  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    com.bank.credit: DEBUG

schema:
  registry:
    url: http://schema-registry:8081

management:
  endpoints:
    web:
      exposure:
        include: "health,info,env"
  endpoint:
    health:
      show-details: always

# ---------------------------------------------------------
# 🔥 AGREGADO: Zipkin + Sleuth (trazabilidad distribuida)
# ---------------------------------------------------------
spring:
  sleuth:
    sampler:
      probability: 1.0   # 🔥 Siempre enviar trazas (100%)
  zipkin:
    base-url: http://zipkin:9411   # 🔥 Zipkin dentro de Docker Compose