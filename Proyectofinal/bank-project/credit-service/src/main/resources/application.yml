# =============================================
# Configuración del servidor
# =============================================
server:
  port: 8083                  # Puerto del servicio
  servlet:
    context-path: /credit     # Context path base (opcional)

spring:
  application:
    name: credit-service      # Nombre de la aplicación para registro y Eureka si se usa
  data:
    mongodb:
      uri: mongodb://mongo:27017/credit_db
      auto-index-creation: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka-1:9092}
  main:
    allow-bean-definition-overriding: true
  devtools:
    restart:
      enabled: true
  redis:
    host: ${REDIS_HOST:redis}  # Host de Redis (variable de entorno REDIS_HOST, por defecto 'redis')
    port: ${REDIS_PORT:6379}   # Puerto de Redis (variable de entorno REDIS_PORT, por defecto 6379)

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    com.bank.credit: DEBUG   # Nivel de log para tu paquete


schema:
  registry:
    url: http://schema-registry:8081

management:
  endpoints:
    web:
      exposure:
        include: "health,info,env"
  endpoint:
    health:
      show-details: always

