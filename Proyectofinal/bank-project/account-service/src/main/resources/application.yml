server:
  port: 8082

spring:                               # unificado: ahora solo hay un bloque 'spring'
  application:
    name: account-service
  data:
    mongodb:
      uri: mongodb://mongo-bank:27017/account_db
  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka-1:9092}
  main:
    allow-bean-definition-overriding: true  # permite redefinir beans si es necesario

logging:
  level:
    root: INFO
    com.bank.account_service: DEBUG

schema:
  registry:
    url: http://schema-registry:8081

management:
  endpoints:
    web:
      exposure:
        include: "health,info,env"
  endpoint:
    health:
      show-details: always