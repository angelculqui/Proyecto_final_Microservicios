openapi: 3.0.3
info:
  title: Account Service API
  description: API para la gestión de cuentas bancarias, incluyendo cuentas de ahorro, corriente y plazo fijo.
  version: 1.0.0
  contact:
    name: Account Service Team
    email: support@bank.com

servers:
  - url: http://localhost:8082
    description: Local environment

tags:
  - name: Accounts
    description: Operaciones CRUD y consultas especiales de cuentas bancarias

paths:

  /accounts:
    get:
      tags: [Accounts]
      summary: Obtener todas las cuentas
      operationId: getAllAccounts
      responses:
        '200':
          description: Lista de cuentas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Account'

    post:
      tags: [Accounts]
      summary: Crear una nueva cuenta
      operationId: createAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Account'
            example:
              customerId: "65f1c2a9e4b0a12f34cd5678"
              accountNumber: "001-123456"
              accountType: "SAVINGS"
              balance: 0
              maxTransactionsWithoutFee: 5
              transactionsThisMonth: 0
              holders: ["65f1c2a9e4b0a12f34cd5678"]
              signers: []
      responses:
        '201':
          description: Cuenta creada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          description: Error de validación o reglas de negocio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Accounts]
      summary: Actualizar una cuenta existente
      operationId: updateAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Account'
      responses:
        '200':
          description: Cuenta actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '404':
          description: Cuenta no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /accounts/{id}:
    get:
      tags: [Accounts]
      summary: Obtener una cuenta por ID
      operationId: getAccountById
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Cuenta encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '404':
          description: Cuenta no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Accounts]
      summary: Eliminar una cuenta
      operationId: deleteAccount
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Cuenta eliminada exitosamente
        '404':
          description: Cuenta no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /accounts/client/{clientId}:
    get:
      tags: [Accounts]
      summary: Obtener cuentas por ID de cliente
      operationId: getAccountsByClient
      parameters:
        - name: clientId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Lista de cuentas del cliente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Account'

  /accounts/{id}/balance:
    get:
      tags: [Accounts]
      summary: Obtener saldo de una cuenta
      operationId: getBalance
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Saldo actual de la cuenta
          content:
            application/json:
              schema:
                type: number
                format: double
        '404':
          description: Cuenta no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /accounts/related/{clientId}:
    get:
      tags: [Accounts]
      summary: Obtener cuentas donde el cliente es titular o firmante
      operationId: getAccountsRelated
      parameters:
        - name: clientId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Lista de cuentas relacionadas al cliente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Account'

components:

  schemas:

    Account:
      type: object
      discriminator:
        propertyName: accountType
      oneOf:
        - $ref: '#/components/schemas/SavingsAccount'
        - $ref: '#/components/schemas/CheckingAccount'
        - $ref: '#/components/schemas/FixedTermAccount'
      required:
        - customerId
        - accountNumber
        - accountType
        - balance
      properties:
        id:
          type: string
        customerId:
          type: string
        accountNumber:
          type: string
        accountType:
          type: string
          enum: [SAVINGS, CHECKING, FIXED]
        balance:
          type: number
        maxTransactionsWithoutFee:
          type: integer
        transactionsThisMonth:
          type: integer
        holders:
          type: array
          items: { type: string }
        signers:
          type: array
          items: { type: string }

    SavingsAccount:
      allOf:
        - $ref: '#/components/schemas/Account'
        - type: object
          properties:
            maintenanceFee:
              type: number
          example:
            accountType: "SAVINGS"
            maintenanceFee: 0.0

    CheckingAccount:
      allOf:
        - $ref: '#/components/schemas/Account'
        - type: object
          properties:
            maintenanceFee:
              type: number
          example:
            accountType: "CHECKING"
            maintenanceFee: 5.0

    FixedTermAccount:
      allOf:
        - $ref: '#/components/schemas/Account'
        - type: object
          properties:
            allowedTransactionDay:
              type: string
              format: date
          example:
            accountType: "FIXED"
            allowedTransactionDay: "2024-03-15"

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
        error:
          type: string
      example:
        status: 400
        error: "Account number already exists"
