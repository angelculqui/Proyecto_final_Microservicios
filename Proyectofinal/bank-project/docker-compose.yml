services:

  # ============================
  # KAFKA MODERNO (KRaft)
  # ============================
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-1
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      # Identificador del nodo
      KAFKA_NODE_ID: 1

      # Identificador único del cluster KRaft (en Base64, 16 bytes -> 24 chars).
      # Confluent espera un CLUSTER_ID codificado en base64; un ejemplo válido de 16 bytes
      # (a partir de la cadena 'abcdefghijklmnop') es 'YWJjZGVmZ2hpamtsbW5vcA=='.
      # Si prefieres generar uno aleatorio en PowerShell, ejecuta:
      # $b = New-Object byte[] 16; (New-Object System.Security.Cryptography.RNGCryptoServiceProvider).GetBytes($b); [Convert]::ToBase64String($b)
      CLUSTER_ID: "YWJjZGVmZ2hpamtsbW5vcA=="

      # Roles del nodo (broker + controller)
      KAFKA_PROCESS_ROLES: broker,controller

      # Quorum de controladores (solo 1 nodo) — usar el nombre de servicio 'kafka' para resolución interna
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"

      # Listeners internos y externos (agregamos EXTERNAL para el puerto 29092)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:29092
      # Anunciar listeners: PLAINTEXT para la comunicación entre contenedores (kafka)
      # y EXTERNAL para acceso desde el host (localhost:29092)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092

      # Mapa de protocolos
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT

      # Listener del controlador
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Directorio de logs KRaft
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs

      # Replicación mínima
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

    restart: always

  # ============================
  # SCHEMA REGISTRY (KRaft)
  # ============================
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: schema-registry-1
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_HOST_NAME: schema-registry-1

  # ============================
  # REDIS
  # ============================
  redis:
    image: redis:6-alpine
    ports:
      - "6379:6379"

  # ============================
  # MONGO
  # ============================
  mongo:
    image: mongo:7
    container_name: mongo-bank
    # Set internal hostname to 'mongo-bank' so other containers can resolve
    # the hostname 'mongo-bank' (we keep container_name as requested).
    # Without this, Docker Compose DNS resolves the service name 'mongo' by default,
    # but not necessarily the container_name. Adding hostname ensures the
    # hostname 'mongo-bank' is resolvable inside the compose network.
    hostname: mongo-bank
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # ============================
  # CUSTOMER SERVICE
  # ============================
  customer-service:
    build:
      context: ./customer-service
    container_name: customer-service
    ports:
      - "18081:8081"
    depends_on:
      - mongo
      - redis
      - kafka
      - schema-registry
    environment:
      # We intentionally use the hostname 'mongo-bank' to match the container_name.
      # Adding 'hostname: mongo-bank' in the mongo service above ensures this
      # hostname resolves inside the Docker Compose network.
      SPRING_DATA_MONGODB_URI: mongodb://mongo-bank:27017/customer_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_PROFILES_ACTIVE: docker

  # ============================
  # ACCOUNT SERVICE
  # ============================
  account-service:
    build:
      context: ./account-service
    container_name: account-service
    ports:
      - "18082:8082"
    depends_on:
      - mongo
      - redis
      - kafka
      - schema-registry
    environment:
      # Use the same mongo container hostname
      SPRING_DATA_MONGODB_URI: mongodb://mongo-bank:27017/account_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_PROFILES_ACTIVE: docker

  # ============================
  # CREDIT SERVICE
  # ============================
  credit-service:
    build:
      context: ./credit-service
    container_name: credit-service
    ports:
      - "18083:8083"
    depends_on:
      - mongo
      - redis
      - kafka
      - schema-registry
    environment:
      # Use the same mongo container hostname
      SPRING_DATA_MONGODB_URI: mongodb://mongo-bank:27017/credit_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_PROFILES_ACTIVE: docker

  # ============================
  # TRANSACTION SERVICE
  # ============================
  transaction-service:
    build:
      context: ./transaction-service
    container_name: transaction-service
    ports:
      - "18084:8084"
    depends_on:
      - mongo
      - redis
      - kafka
      - schema-registry
    environment:
      # Use the same mongo container hostname
      SPRING_DATA_MONGODB_URI: mongodb://mongo-bank:27017/transaction_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_PROFILES_ACTIVE: docker

volumes:
  mongo-data:
