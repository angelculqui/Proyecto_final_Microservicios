services:

  # ============================
  # KAFKA MODERNO (KRaft)
  # ============================
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-1
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      CLUSTER_ID: "YWJjZGVmZ2hpamtsbW5vcA=="
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      # 🔥 CAMBIO: aclaramos que PLAINTEXT://kafka:9092 es para la red interna Docker,
      # y EXTERNAL://localhost:29092 es para acceder desde tu máquina local.
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    restart: always

  # ============================
  # SCHEMA REGISTRY (KRaft)
  # ============================
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: schema-registry-1
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      # 🔥 CAMBIO: antes podía estar mal apuntando a otro puerto,
      # ahora lo dejamos explícito a kafka:9092 (interno).
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_HOST_NAME: schema-registry-1
    restart: always

  # ============================
  # REDIS
  # ============================
  redis:
    image: redis:6-alpine
    ports:
      - "6379:6379"
    healthcheck:                      # ✔ CAMBIO: agregamos healthcheck para que el Gateway espere a Redis
      test: ["CMD", "redis-cli", "ping"]   # ✔ prueba básica: responde "PONG"
      interval: 10s                        # ✔ cada 10 segundos
      timeout: 5s                          # ✔ espera máximo 5 segundos
      retries: 5                           # ✔ intenta 5 veces antes de marcar DOWN

  # ============================
  # MONGO
  # ============================
  mongo:
    image: mongo:7
    container_name: mongo-bank
    hostname: mongo-bank
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # ============================
  # EUREKA
  # ============================
  eureka-server:
    build:
      context: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - default

  # ============================
  # CUSTOMER SERVICE
  # ============================
  customer-service:
    build:
      context: ./customer-service
    container_name: customer-service
    ports:
      - "18081:8081"
    depends_on:
      - mongo
      - redis
      - kafka
      - schema-registry
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo-bank:27017/customer_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_PROFILES_ACTIVE: docker

  # ============================
  # ACCOUNT SERVICE
  # ============================
  account-service:
    build:
      context: ./account-service
    container_name: account-service
    ports:
      - "18082:8082"
    depends_on:
      - mongo
      - redis
      - kafka
      - schema-registry
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo-bank:27017/account_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_PROFILES_ACTIVE: docker

  # ============================
  # CREDIT SERVICE
  # ============================
  credit-service:
    build:
      context: ./credit-service
    container_name: credit-service
    ports:
      - "18083:8083"
    depends_on:
      - mongo
      - redis
      - kafka
      - schema-registry
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo-bank:27017/credit_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_PROFILES_ACTIVE: docker

  # ============================
  # TRANSACTION SERVICE
  # ============================
  transaction-service:
    build:
      context: ./transaction-service
    container_name: transaction-service
    ports:
      - "18084:8084"
    depends_on:
      - mongo
      - redis
      - kafka
      - schema-registry
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo-bank:27017/transaction_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_PROFILES_ACTIVE: docker

  # ============================
  # API-GATEWAY
  # ============================
  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    ports:
      - "8090:8090"
    depends_on:
      redis:                         # ✔ CAMBIO: ahora depende del healthcheck de Redis
        condition: service_healthy   # ✔ CAMBIO: espera a que Redis esté realmente listo
      eureka-server:
        condition: service_started
      customer-service:
        condition: service_started
      account-service:
        condition: service_started
      credit-service:
        condition: service_started
      transaction-service:
        condition: service_started

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

    environment:
      SPRING_PROFILES_ACTIVE: docker

  # ============================
  # ZIPKIN (trazabilidad distribuida)
  # ============================
  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"


  # ============================
  # SONARQUBE (ANÁLISIS DE CÓDIGO)
  # ============================
  sonarqube:
    image: sonarqube:latest
    container_name: sonarqube
    ports:
      - "9001:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
    restart: always


volumes:
  mongo-data:
  sonarqube_data:
  sonarqube_extensions:


